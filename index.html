<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIG Stunting Pasarwajo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Latar belakang gradasi biru ke putih polos */
            background: linear-gradient(to bottom, #1e3a8a 0%, #ffffff 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex flex-col justify-between items-center font-sans p-4">

    <!-- Header -->
    <header class="w-full max-w-2xl mx-auto mt-10 text-center text-white drop-shadow-md">
        <div class="bg-blue-900/40 backdrop-blur-sm px-6 py-4 rounded-xl border border-white/20">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider uppercase">
                Sistem Informasi Geografis Stunting
            </h1>
            <p class="text-sm md:text-base font-medium text-blue-100 mt-1">
                Kecamatan Pasarwajo Kabupaten Buton
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-md mx-auto my-auto py-8">
        <div class="bg-white rounded-2xl shadow-2xl p-8 border border-slate-100 relative overflow-hidden">
            
            <!-- Logo BKKBN Kabupaten Buton -->
            <div class="flex flex-col items-center mb-6">
                <img src="ChatGPT Image 6 Jun 2026, 01.05.39.png" 
                     alt="Logo BKKBN Kabupaten Buton" 
                     class="h-32 w-auto object-contain mb-4">
            </div>

            <!-- Form -->
            <form action="dashboard.html" method="GET" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan Username" required
                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 transition text-sm">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                               class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 transition text-sm">
                        
                        <!-- Tombol Mata untuk lihat password -->
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3.5 rounded-xl transition shadow-lg mt-2 text-sm uppercase tracking-wider">
                    Login
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 text-slate-800 text-xs font-medium">
        &copy; 2026 SIG Stunting Kabupaten Buton. All rights reserved.
    </footer>

    <!-- Script untuk Toggle Password -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
        });
    </script>
</body>
</html>
